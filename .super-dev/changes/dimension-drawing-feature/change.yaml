    type: modify

# 验收标准
acceptance_criteria:
  - 能够根据尺寸数量自动分区画布
  - 能够正确绘制不同类型的尺寸数据
  - 能够处理空位置度的基准框绘制
  - 能够正确对齐基准框
  - 能够导出绘制结果为图片
  - 能够保存绘制配置和结果