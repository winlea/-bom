  - prd: output/dimension-drawing-feature-prd.md
  - architecture: output/dimension-drawing-feature-architecture.md
  - uiux: output/dimension-drawing-feature-uiux.md

# 变更内容
targets:
  - path: bom-redesign/bom-system-redesign/src/components/dimension-drawing-canvas.tsx
    type: new
  - path: bom-redesign/bom-system-redesign/src/components/dimension-drawing-config.tsx
    type: new
  - path: bom-redesign/bom-system-redesign/src/components/dimension-drawing-preview.tsx
    type: new
  - path: bom-redesign/bom-system-redesign/src/pages/dimension-drawing.tsx
    type: new
  - path: bom_system/dimensions/api.py
    type: modify
