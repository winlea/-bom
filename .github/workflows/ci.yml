# .github/workflows/ci.yml
name: CI

on: 
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ================================
  # 代码质量检查
  # ================================
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy pytest pytest-cov
          pip install -r requirements.txt
          
      - name: Check formatting with black
        run: black --check . --config=pyproject.toml
        continue-on-error: false
        
      - name: Check imports with isort
        run: isort --check . --config=pyproject.toml
        continue-on-error: false
        
      - name: Lint with flake8
        run: flake8 bom_system/ tests/
        continue-on-error: false
        
      - name: Type check with mypy
        run: mypy bom_system/ --config-file=pyproject.toml
        continue-on-error: true

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bom-redesign/bom-system-redesign
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './bom-redesign/bom-system-redesign/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        continue-on-error: false
        
      - name: Type Check
        run: npm run type-check
        continue-on-error: false
        
      - name: Build
        run: npm run build
        continue-on-error: false

  # ================================
  # 测试
  # ================================
  test-python:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: pytest tests/ -v --cov=bom_system --cov-report=xml
        env:
          DATABASE_URL: mysql+pymysql://root:test@localhost:3306/test_db
          
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bom-redesign/bom-system-redesign
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './bom-redesign/bom-system-redesign/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test -- --coverage --ci

  # ================================
  # PR审查要求检查
  # ================================
  pr-check:
    runs-on: ubuntu-latest
    needs: [lint-python, lint-frontend, test-python, test-frontend]
    
    # 只有PR才需要此检查
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check PR status
        run: |
          echo "=== 代码审查前置检查完成 ==="
          echo "- Python代码风格检查: 通过"
          echo "- Python类型检查: 通过"
          echo "- 前端代码检查: 通过"
          echo "- Python测试: 通过"
          echo "- 前端测试: 通过"
          echo ""
          echo "请等待人工代码审查..."

  # ================================
  # 安全扫描 (可选)
  # ================================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run safety check
        run: |
          pip install safety
          safety check --json --output findings.json || true
        continue-on-error: true
